<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Skills Finder — discover Claude Code skills, plugins, agents</title>
  <meta name="description" content="Search GitHub for Claude Code skills, plugins, and agents. Ranked by relevance + stars.">
  <style>
    :root {
      --bg: #0b0e14;
      --panel: #11151c;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #06b6d4;
      --border: #21262d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    main { max-width: 860px; margin: 0 auto; padding: 48px 20px 80px; }
    header { margin-bottom: 32px; }
    .eyebrow { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px; letter-spacing: 0.15em; color: var(--accent); opacity: 0.8; margin-bottom: 12px; }
    h1 { margin: 0 0 8px; font-size: 36px; letter-spacing: -0.02em; }
    .sub { color: var(--muted); margin: 0; }
    form { display: flex; gap: 8px; margin: 24px 0 16px; }
    input[type=text] {
      flex: 1; padding: 12px 14px; background: var(--panel);
      border: 1px solid var(--border); color: var(--text);
      border-radius: 8px; font-size: 15px;
    }
    input[type=text]:focus { outline: none; border-color: var(--accent); }
    button {
      padding: 12px 20px; background: var(--accent); color: #001014;
      border: 0; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 15px;
    }
    button:disabled { opacity: 0.6; cursor: wait; }
    .presets { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
    .chip {
      padding: 6px 12px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 999px; font-size: 13px; cursor: pointer; color: var(--muted);
    }
    .chip:hover { color: var(--accent); border-color: var(--accent); }
    .repo {
      padding: 16px; background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; margin-bottom: 12px;
    }
    .repo-head { display: flex; justify-content: space-between; gap: 12px; align-items: baseline; }
    .repo a.name { color: var(--text); font-weight: 600; text-decoration: none; }
    .repo a.name:hover { color: var(--accent); }
    .stars { color: var(--muted); font-size: 14px; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .desc { color: var(--muted); margin: 6px 0 8px; font-size: 14px; }
    .topics { display: flex; flex-wrap: wrap; gap: 6px; }
    .topic { font-size: 11px; padding: 2px 8px; background: rgba(6, 182, 212, 0.1); color: var(--accent); border-radius: 999px; }
    .meta { color: var(--muted); font-size: 12px; }
    .err { color: #f85149; padding: 12px; background: rgba(248, 81, 73, 0.08); border-radius: 8px; }
    footer { margin-top: 48px; padding-top: 24px; border-top: 1px solid var(--border); color: var(--muted); font-size: 13px; }
    footer a { color: var(--accent); text-decoration: none; }
    .loading { color: var(--muted); padding: 24px 0; text-align: center; }
  </style>
</head>
<body>
<main>
  <header>
    <div class="eyebrow">— Claude Skills Finder</div>
    <h1>Find the right Claude Code skill</h1>
    <p class="sub">Search GitHub for community-built skills, plugins, and agents. Ranked by relevance + stars.</p>
  </header>

  <form id="search-form">
    <input type="text" id="q" placeholder="e.g. seo content, testing, deployment" autocomplete="off">
    <button type="submit" id="btn">Search</button>
  </form>

  <div class="presets" id="presets"></div>

  <div id="results"><div class="loading">Loading…</div></div>

  <footer>
    <p>
      Open source: <a href="https://github.com/Muzili919/claude-skills-finder">github.com/Muzili919/claude-skills-finder</a><br>
      Enhanced version with daily trending: <a href="https://muzi.studio/tools/claude-skills">muzi.studio/tools/claude-skills</a>
    </p>
  </footer>
</main>

<script>
const PRESETS = [
  { label: "SEO / content", q: "seo content" },
  { label: "Automation / testing", q: "automation testing" },
  { label: "Data / reports", q: "data analysis report" },
  { label: "Research / writing", q: "research writing" },
  { label: "Frontend / web", q: "frontend web design" },
  { label: "DevOps", q: "devops deploy" },
];

const $ = (id) => document.getElementById(id);
const presetsEl = $("presets"), resultsEl = $("results"), qEl = $("q"), btn = $("btn");

PRESETS.forEach(p => {
  const c = document.createElement("button");
  c.type = "button"; c.className = "chip"; c.textContent = p.label;
  c.onclick = () => { qEl.value = p.q; runSearch(p.q); };
  presetsEl.appendChild(c);
});

async function searchOne(q) {
  const params = new URLSearchParams({
    q: q + " in:name,description,readme",
    sort: "stars", order: "desc", per_page: "30",
  });
  const r = await fetch("https://api.github.com/search/repositories?" + params, {
    headers: { Accept: "application/vnd.github+json" },
  });
  if (!r.ok) throw new Error("GitHub API " + r.status);
  const d = await r.json();
  return (d.items || []).map(it => ({
    name: it.full_name,
    description: it.description || "",
    stars: it.stargazers_count || 0,
    url: it.html_url,
    topics: it.topics || [],
    updated_at: it.updated_at || "",
  }));
}

function rank(repos, q) {
  const qLower = q.toLowerCase();
  return repos.map(r => {
    let s = Math.log10(r.stars + 1) * 2;
    const blob = (r.name + " " + r.description + " " + r.topics.join(" ")).toLowerCase();
    if (blob.includes("claude code")) s += 10;
    if (blob.includes("claude-code")) s += 10;
    ["skill", "plugin", "agent", "tool"].forEach(k => { if (blob.includes(k)) s += 2; });
    qLower.split(/\s+/).forEach(w => { if (w.length > 2 && blob.includes(w)) s += 1; });
    return { r, s };
  }).sort((a, b) => b.s - a.s).map(x => x.r);
}

async function runSearch(q) {
  btn.disabled = true;
  resultsEl.innerHTML = '<div class="loading">Searching GitHub…</div>';
  try {
    const queries = ['"claude code" ' + q, "claude-code " + q];
    const lists = await Promise.all(queries.map(qq => searchOne(qq).catch(() => [])));
    const seen = new Set(), all = [];
    lists.flat().forEach(r => { if (!seen.has(r.name)) { seen.add(r.name); all.push(r); } });
    const ranked = rank(all, q).slice(0, 20);
    renderResults(ranked);
  } catch (e) {
    resultsEl.innerHTML = '<div class="err">Error: ' + (e.message || e) + ' (GitHub limits unauth requests to 60/hour)</div>';
  } finally {
    btn.disabled = false;
  }
}

function renderResults(repos) {
  if (!repos.length) {
    resultsEl.innerHTML = '<div class="loading">No results. Try different keywords.</div>';
    return;
  }
  resultsEl.innerHTML = repos.map(r => `
    <div class="repo">
      <div class="repo-head">
        <a class="name" href="${r.url}" target="_blank" rel="noopener">${r.name}</a>
        <span class="stars">★ ${r.stars.toLocaleString()}</span>
      </div>
      ${r.description ? `<div class="desc">${escapeHtml(r.description)}</div>` : ""}
      ${r.topics.length ? `<div class="topics">${r.topics.slice(0, 6).map(t => `<span class="topic">${escapeHtml(t)}</span>`).join("")}</div>` : ""}
    </div>
  `).join("");
}

function escapeHtml(s) {
  return s.replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

$("search-form").addEventListener("submit", e => {
  e.preventDefault();
  const q = qEl.value.trim();
  if (q) runSearch(q);
});

runSearch("claude code skill");
</script>
</body>
</html>
